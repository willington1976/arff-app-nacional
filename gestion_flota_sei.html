<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SEI — Gestión de Flota Interactiva</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>

    <style>
        :root {
            --bg: #060c14;
            --surface: #0d1520;
            --s2: #111d2e;
            --s3: #162035;
            --border: #1c2e47;
            --border2: #243a58;
            --teal: #00ff9d;
            /* Neon Green */
            --teal-glow: rgba(0, 255, 157, .3);
            --red: #ff2e2e;
            /* Bright Red */
            --red-glow: rgba(255, 46, 46, .3);
            --amber: #ffcc00;
            --amber-glow: rgba(255, 204, 0, .3);
            --maint: #38bdf8;
            /* Mantenimiento (Sky) */
            --sky: #38bdf8;
            --text: #ffffff;
            --text-dim: #a0aec0;
            --ff-t: 'Syne', sans-serif;
            --ff-b: 'DM Sans', sans-serif;
            --ff-m: 'DM Mono', monospace;
            --r: 12px;
            --tr: .15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Selector de Aeropuerto (Admin) */
        .admin-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(0, 255, 157, 0.05);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 8px;
        }

        .admin-controls label {
            font-family: var(--ff-m);
            font-size: 10px;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--ff-b);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle, #1e3a5f 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Scanlines overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .05) 2px, rgba(0, 0, 0, .05) 4px);
            opacity: 0.3;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-family: var(--ff-m);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--tr);
        }

        .btn-back:hover {
            color: var(--teal);
        }

        .title-block h1 {
            font-family: var(--ff-t);
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── TABLE STYLING ── */
        .table-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: var(--s2);
            font-family: var(--ff-m);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 15px 12px;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        /* Registration Row (First Row) */
        .reg-row {
            background: rgba(11, 197, 160, 0.03);
            border-bottom: 2px solid var(--teal);
        }

        .reg-row input,
        .edit-input {
            width: 100%;
            background: var(--s3);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-family: var(--ff-m);
            font-size: 12px;
            outline: none;
            transition: var(--tr);
        }

        .reg-row input:focus,
        .edit-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 2px var(--teal-glow);
        }

        /* Action Buttons */
        .btn-action {
            padding: 8px 12px;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--ff-m);
            font-size: 10px;
            text-transform: uppercase;
            transition: var(--tr);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save {
            background: var(--teal);
            color: #000;
            font-weight: 700;
        }

        .btn-save:hover {
            background: #0ee0b6;
            transform: translateY(-1px);
        }

        /* Status Toggle Group */
        .status-toggle-group {
            display: flex;
            background: var(--s2);
            padding: 3px;
            border-radius: 6px;
            border: 1px solid var(--border);
            gap: 2px;
        }

        .btn-toggle {
            flex: 1;
            padding: 6px 4px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: var(--ff-m);
            font-size: 8px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--tr);
            letter-spacing: 0.5px;
        }

        .btn-toggle.active[data-status="OPERATIVO"] {
            background: var(--teal);
            color: #000;
            box-shadow: 0 0 10px var(--teal-glow);
        }

        .btn-toggle.active[data-status="FUSER"] {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 10px var(--red-glow);
        }

        .btn-toggle.active[data-status="MANTENIMIENTO"] {
            background: var(--sky);
            color: #fff;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .btn-toggle:not(.active):hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        /* Novedades Table Styling */
        .nov-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 4px;
            margin-top: 10px;
        }

        .nov-table th {
            background: transparent;
            border: none;
            padding: 4px 10px;
            color: var(--text-dim);
        }

        .nov-table td {
            background: var(--s2);
            border: none;
            padding: 8px 10px;
        }

        .nov-table tr td:first-child {
            border-radius: 4px 0 0 4px;
        }

        .nov-table tr td:last-child {
            border-radius: 0 4px 4px 0;
        }

        .nov-input,
        .nov-select {
            width: 100%;
            background: var(--s3);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: #fff;
            padding: 6px;
            font-size: 11px;
            font-family: var(--ff-b);
        }

        .badge-sev {
            padding: 2px 6px;
            border-radius: 3px;
            font-family: var(--ff-m);
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bg-critica {
            background: var(--red);
            color: white;
        }

        .bg-leve {
            background: var(--amber);
            color: black;
        }

        /* Novedades Row */
        .nested-row {
            background: rgba(0, 0, 0, 0.4);
        }

        .nested-box {
            padding: 15px 40px;
            border-left: 2px solid var(--border2);
        }

        .nov-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .nov-title {
            font-family: var(--ff-m);
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nov-badge {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 10px;
            background: var(--s2);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-bottom: 6px;
            align-items: center;
        }

        .nov-badge.critica {
            border-left: 4px solid var(--red);
        }

        .nov-badge.leve {
            border-left: 4px solid var(--amber);
        }

        .nov-desc {
            font-size: 12px;
            color: var(--text);
        }

        .nov-sev {
            font-family: var(--ff-m);
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .sev-critica {
            background: rgba(240, 62, 62, 0.1);
            color: var(--red);
        }

        .sev-leve {
            background: rgba(245, 159, 0, 0.1);
            color: var(--amber);
        }

        /* Row State Backgrounds */
        .row-fuser {
            background: rgba(255, 46, 46, 0.1) !important;
        }

        .row-fuser td:first-child {
            color: var(--red) !important;
            text-shadow: 0 0 5px rgba(255, 46, 46, 0.5);
        }

        .row-maint {
            background: rgba(255, 204, 0, 0.1) !important;
        }

        .row-maint td:first-child {
            color: var(--amber) !important;
        }

        .row-operativo {
            background: rgba(0, 255, 157, 0.02) !important;
        }

        /* Status Toggles and indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .dot-ok {
            background: var(--teal);
            box-shadow: 0 0 8px var(--teal);
        }

        .dot-fuser {
            background: var(--red);
            box-shadow: 0 0 8px var(--red);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        /* Loader */
        .loader-wrap {
            text-align: center;
            padding: 100px;
            color: var(--text-dim);
            font-family: var(--ff-m);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="title-block">
                <h1>PANEL TÉCNICO · FLOTA SEI</h1>
                <p style="color: var(--text-dim); font-size: 11px; margin-top: 4px; font-family: var(--ff-m);">
                    Sincronización de Capacidades Extintoras e Inventario</p>
            </div>
            <a href="dashboard_principal.html" class="btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Dashboard
            </a>
        </header>

        <div id="vista-label" style="font-family:var(--ff-m);font-size:9px;color:var(--teal);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;padding:4px 10px;background:rgba(11,197,160,.06);border:1px solid rgba(11,197,160,.15);border-radius:4px;display:inline-block">CARGANDO...</div>
        <div id="admin-panel" class="admin-controls" style="display: none; margin-bottom: 15px;">
            <label>MODO ADMINISTRADOR:</label>
            <select id="admin-airport-selector" class="edit-input"
                style="width: auto; height: 32px; background: var(--surface); padding: 5px 30px 5px 10px;"
                onchange="changeAirport(this.value)">
                <option value="">Seleccione Aeropuerto...</option>
                <option value="SKBO">BOGOTÁ (SKBO)</option>
                <option value="SKRG">RIONEGRO (SKRG)</option>
                <option value="SKCL">CALI (SKCL)</option>
                <option value="SKCC">CÚCUTA (SKCC)</option>
                <option value="SKCG">CARTAGENA (SKCG)</option>
                <option value="SKSM">SANTA MARTA (SKSM)</option>
            </select>
            <span
                style="font-family: var(--ff-m); font-size: 10px; color: var(--text-dim); margin-left: auto; letter-spacing: 1px;">BASE:
                <strong id="current-station-tag" style="color: var(--teal);">...</strong></span>
        </div>

        <div class="table-panel">
            <table>
                <thead>
                    <tr>
                        <th style="width: 100px;">Nº Interno</th>
                        <th>Marca / Modelo</th>
                        <th style="width: 90px;">Agua (Gal)</th>
                        <th style="width: 90px;">Espuma (Gal)</th>
                        <th style="width: 90px;">PQS (Lb)</th>
                        <th style="width: 110px;">Q Torreta (Lpm)</th>
                        <th style="width: 120px;">Aeropuerto ID</th>
                        <th style="width: 100px;">Control</th>
                    </tr>
                </thead>
                <tbody id="fleet-body">
                    <!-- Registro Fila -->
                    <tr class="reg-row">
                        <td><input type="text" id="reg-numero" placeholder="P-01"></td>
                        <td>
                            <div style="display: flex; gap: 4px;">
                                <input type="text" id="reg-marca" placeholder="Oshkosh" style="width: 40%;">
                                <input type="text" id="reg-modelo" placeholder="Striker 3000" style="width: 60%;">
                            </div>
                        </td>
                        <td><input type="number" id="reg-agua" placeholder="3000"></td>
                        <td><input type="number" id="reg-espuma" placeholder="420"></td>
                        <td><input type="number" id="reg-pqs" placeholder="500"></td>
                        <td><input type="number" id="reg-torreta" placeholder="1200"></td>
                        <td><input type="text" id="reg-aero" placeholder="SKBO"></td>
                        <td>
                            <button class="btn-action btn-save" onclick="saveMachine()">
                                <span>GUARDAR</span>
                            </button>
                        </td>
                    </tr>
                    <!-- Data rows will be injected here -->
                </tbody>
            </table>
            <div id="loader" class="loader-wrap">CONECTANDO A SUPABASE...</div>
        </div>
    </div>

    <script>
        let fleetData     = [];
        let noveltiesData = [];

        /* Estado de sesion - poblado por onSEIReady */
        let isAdmin            = false;
        let currentUserAirport = 'SKBO';

        /* ================================================================
           onSEIReady - auth-guard llama aqui cuando la sesion esta lista
           Firma: (user, rol, nombre, estacion)
        ================================================================ */
        window.onSEIReady = function(user, rol, nombre, estacion) {
            isAdmin = ['admin', 'jefe_nacional'].includes(rol);

            if (isAdmin) {
                document.getElementById('admin-panel').style.display = 'flex';
                document.getElementById('vista-label').textContent   = 'VISTA: NACIONAL';
                currentUserAirport = document.getElementById('admin-airport-selector').value || 'SKBO';
            } else {
                currentUserAirport = estacion || 'SKBO';
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('current-station-tag').textContent = currentUserAirport;
                document.getElementById('vista-label').textContent = 'ESTACION: ' + currentUserAirport;
                var regAero = document.getElementById('reg-aero');
                if (regAero) {
                    regAero.value    = currentUserAirport;
                    regAero.readOnly = true;
                    regAero.style.opacity = '0.6';
                }
            }
            loadData();
        };

        /* changeAirport - solo admin/jefe */
        async function changeAirport(aeroId) {
            if (!aeroId || !isAdmin) return;
            currentUserAirport = aeroId;
            document.getElementById('current-station-tag').textContent = aeroId;
            document.getElementById('reg-aero').value = aeroId;
            await loadData();
        }

        /* ================================================================
           loadData - filtra por estacion segun rol
        ================================================================ */
        async function loadData() {
            document.getElementById('loader').style.display = 'block';
            try {
                var query = supabaseClient
                    .from('maquinas_sei')
                    .select('*')
                    .order('numero_interno', { ascending: true });

                query = query.eq('aeropuerto_id', currentUserAirport);

                var res = await query;
                if (res.error) throw res.error;
                var machines = res.data || [];

                var machineIds = machines.map(function(m){ return m.id; });
                var novs = [];
                if (machineIds.length > 0) {
                    var novRes = await supabaseClient
                        .from('novedades_maquinas')
                        .select('*')
                        .in('maquina_id', machineIds)
                        .eq('reparado', false);
                    if (novRes.error) throw novRes.error;
                    novs = novRes.data || [];
                }

                fleetData     = machines;
                noveltiesData = novs;
                renderTable();

            } catch (err) {
                console.error(err);
                document.getElementById('loader').textContent = 'ERROR: ' + err.message;
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        /* ================================================================
           renderTable
        ================================================================ */
        function renderTable() {
            var tbody  = document.getElementById('fleet-body');
            var regRow = tbody.querySelector('.reg-row');
            tbody.innerHTML = '';
            tbody.appendChild(regRow);

            fleetData.forEach(function(m) {
                var mNovs      = noveltiesData.filter(function(n){ return n.maquina_id === m.id; });
                var hasCritical = mNovs.some(function(n){ return n.severidad === 'critica' && !n.reparado; });

                var currentStatus = m.estado || 'OPERATIVO';
                if (hasCritical && (currentStatus === 'OPERATIVO' || currentStatus === 'OPERATIVA')) {
                    currentStatus = 'FUSER';
                }

                var isFuser = currentStatus === 'FUSER' || currentStatus === 'Fuera de Servicio';
                var isMaint = currentStatus === 'MANTENIMIENTO' || currentStatus === 'MANT';

                var rowClass = 'row-operativo';
                if (isFuser) rowClass = 'row-fuser';
                else if (isMaint) rowClass = 'row-maint';

                var aeroCell = isAdmin
                    ? '<input type="text" class="edit-input" value="' + (m.aeropuerto_id || '') + '" onchange="updateField(' + m.id + ',\'aeropuerto_id\',this.value)">'
                    : '<span style="font-family:var(--ff-m);font-size:11px;color:var(--teal)">' + (m.aeropuerto_id || '') + '</span>';

                var row = document.createElement('tr');
                row.className = rowClass;
                row.innerHTML =
                    '<td style="font-family:var(--ff-m);font-weight:700">' +
                        (m.numero_interno || '&mdash;') +
                        (isFuser ? '<br><span style="color:var(--red);font-size:9px">FUSER</span>' : '') +
                        (isMaint ? '<br><span style="color:var(--amber);font-size:9px">MANT</span>' : '') +
                    '</td>' +
                    '<td>' +
                        '<input type="text" class="edit-input" value="' + (m.marca || '') + '" onchange="updateField(' + m.id + ',\'marca\',this.value)">' +
                        '<input type="text" class="edit-input" style="margin-top:3px" value="' + (m.modelo || '') + '" onchange="updateField(' + m.id + ',\'modelo\',this.value)">' +
                    '</td>' +
                    '<td><input type="number" class="edit-input" value="' + (m.agua_galones || 0) + '" onchange="updateField(' + m.id + ',\'agua_galones\',this.value)"></td>' +
                    '<td><input type="number" class="edit-input" value="' + (m.espuma_galones || 0) + '" onchange="updateField(' + m.id + ',\'espuma_galones\',this.value)"></td>' +
                    '<td><input type="number" class="edit-input" value="' + (m.pqs_lb || 0) + '" onchange="updateField(' + m.id + ',\'pqs_lb\',this.value)"></td>' +
                    '<td><input type="number" class="edit-input" value="' + (m.q_torreta_lpm || 0) + '" onchange="updateField(' + m.id + ',\'q_torreta_lpm\',this.value)"></td>' +
                    '<td>' + aeroCell + '</td>' +
                    '<td style="display:flex;flex-direction:column;gap:4px">' +
                        '<button class="btn-action btn-nov" onclick="addNovelty(' + m.id + ')" style="font-size:9px;padding:3px 8px">+ NOV</button>' +
                        '<button class="btn-action btn-del" onclick="deleteMachine(' + m.id + ')" style="font-size:9px;padding:3px 8px;margin-top:2px">DEL</button>' +
                    '</td>';
                tbody.appendChild(row);

                /* Filas de novedades */
                mNovs.forEach(function(n) {
                    var nrow = document.createElement('tr');
                    nrow.className = 'nov-row ' + (n.severidad === 'critica' ? 'row-fuser' : 'row-maint');
                    nrow.innerHTML =
                        '<td colspan="2" style="padding:5px 12px;font-family:var(--ff-m);font-size:10px">' +
                            '<strong style="color:' + (n.severidad === 'critica' ? 'var(--red)' : 'var(--amber)') + '">' +
                            '[' + (n.severidad || 'menor').toUpperCase() + '] </strong>' +
                            (n.descripcion || '') +
                            '<span style="color:var(--text-muted);margin-left:6px">' + (n.fecha_reporte || '') + '</span>' +
                        '</td>' +
                        '<td colspan="3" style="padding:5px;font-family:var(--ff-m);font-size:10px;color:var(--text-dim)">Resp: ' + (n.responsable || '&mdash;') + '</td>' +
                        '<td colspan="2" style="padding:5px;text-align:right">' +
                            '<button class="btn-action btn-save" onclick="markRepaired(' + n.id + ')" style="font-size:9px;padding:3px 8px">REPARADO</button>' +
                            '<button class="btn-action btn-del" onclick="deleteNovelty(' + n.id + ')" style="font-size:9px;padding:3px 6px;margin-left:3px">DEL</button>' +
                        '</td>';
                    tbody.appendChild(nrow);
                });
            });
        }

        /* addNovelty */
        async function addNovelty(machineId) {
            var desc = prompt('Descripcion de la novedad:');
            if (!desc) return;
            var sev  = confirm('Es CRITICA? (OK=Critica / Cancelar=Menor)') ? 'critica' : 'menor';
            var resp = prompt('Responsable asignado:') || 'Sin asignar';
            var res  = await supabaseClient.from('novedades_maquinas').insert([{
                maquina_id:    machineId,
                descripcion:   desc,
                severidad:     sev,
                responsable:   resp,
                reparado:      false,
                fecha_reporte: new Date().toISOString().split('T')[0]
            }]);
            if (res.error) alert('Error: ' + res.error.message);
            else loadData();
        }

        /* saveMachine */
        async function saveMachine() {
            var payload = {
                numero_interno: document.getElementById('reg-numero').value.toUpperCase().trim(),
                marca:          document.getElementById('reg-marca').value.trim(),
                modelo:         document.getElementById('reg-modelo').value.trim(),
                agua_galones:   parseFloat(document.getElementById('reg-agua').value) || 0,
                espuma_galones: parseFloat(document.getElementById('reg-espuma').value) || 0,
                pqs_lb:         parseFloat(document.getElementById('reg-pqs').value) || 0,
                q_torreta_lpm:  parseFloat(document.getElementById('reg-torreta').value) || 0,
                aeropuerto_id:  document.getElementById('reg-aero').value.toUpperCase().trim(),
                estado:         'OPERATIVO'
            };

            if (!payload.numero_interno || !payload.aeropuerto_id) {
                alert('Numero Interno y Aeropuerto ID son obligatorios.');
                return;
            }

            if (!isAdmin && payload.aeropuerto_id !== currentUserAirport) {
                alert('Solo puede registrar maquinas en su estacion asignada: ' + currentUserAirport);
                return;
            }

            var chk = await supabaseClient
                .from('maquinas_sei')
                .select('id')
                .eq('numero_interno', payload.numero_interno)
                .eq('aeropuerto_id',  payload.aeropuerto_id)
                .single();

            if (chk.data) {
                alert('ERROR: El vehiculo [' + payload.numero_interno + '] ya esta registrado en ' + payload.aeropuerto_id);
                return;
            }

            var res = await supabaseClient.from('maquinas_sei').insert([payload]);
            if (res.error) { alert('Error al guardar: ' + res.error.message); return; }

            ['reg-numero','reg-marca','reg-modelo','reg-agua','reg-espuma','reg-pqs','reg-torreta'].forEach(function(id) {
                var el = document.getElementById(id); if (el) el.value = '';
            });
            loadData();
        }

        /* updateField */
        async function updateField(id, field, value) {
            if (field === 'aeropuerto_id' && !isAdmin) return;
            var numFields = ['agua_galones','espuma_galones','pqs_lb','q_torreta_lpm'];
            var updateVal = numFields.includes(field) ? (parseFloat(value) || 0) : value;
            var res = await supabaseClient.from('maquinas_sei').update({ [field]: updateVal }).eq('id', id);
            if (res.error) alert('Error al actualizar: ' + res.error.message);
            else loadData();
        }

        /* deleteMachine */
        async function deleteMachine(id) {
            if (!confirm('Eliminar esta maquina y todas sus novedades?')) return;
            var res = await supabaseClient.from('maquinas_sei').delete().eq('id', id);
            if (res.error) alert(res.error.message);
            else loadData();
        }

        /* markRepaired */
        async function markRepaired(nId) {
            var res = await supabaseClient.from('novedades_maquinas').update({ reparado: true }).eq('id', nId);
            if (res.error) alert(res.error.message);
            else loadData();
        }

        /* deleteNovelty */
        async function deleteNovelty(nId) {
            if (!confirm('Eliminar registro de novedad?')) return;
            var res = await supabaseClient.from('novedades_maquinas').delete().eq('id', nId);
            if (res.error) alert(res.error.message);
            else loadData();
        }

    </script>
</body>

</html>
