<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SEI — Gestión de Flota Interactiva</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #060c14;
            --surface: #0d1520;
            --s2: #111d2e;
            --s3: #162035;
            --border: #1c2e47;
            --border2: #243a58;
            --teal: #0bc5a0;
            --teal-glow: rgba(11, 197, 160, .15);
            --red: #f03e3e;
            --amber: #f59f00;
            --sky: #38bdf8;
            --text: #dde4ee;
            --text-dim: #7a90aa;
            --ff-t: 'Syne', sans-serif;
            --ff-b: 'DM Sans', sans-serif;
            --ff-m: 'DM Mono', monospace;
            --r: 12px;
            --tr: .2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--ff-b);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle, #1e3a5f 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Scanlines overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .05) 2px, rgba(0, 0, 0, .05) 4px);
            opacity: 0.3;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-family: var(--ff-m);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--tr);
        }

        .btn-back:hover {
            color: var(--teal);
        }

        .title-block h1 {
            font-family: var(--ff-t);
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── TABLE STYLING ── */
        .table-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: var(--s2);
            font-family: var(--ff-m);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 15px 12px;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        /* Registration Row (First Row) */
        .reg-row {
            background: rgba(11, 197, 160, 0.03);
            border-bottom: 2px solid var(--teal);
        }

        .reg-row input,
        .edit-input {
            width: 100%;
            background: var(--s3);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-family: var(--ff-m);
            font-size: 12px;
            outline: none;
            transition: var(--tr);
        }

        .reg-row input:focus,
        .edit-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 2px var(--teal-glow);
        }

        /* Action Buttons */
        .btn-action {
            padding: 8px 12px;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--ff-m);
            font-size: 10px;
            text-transform: uppercase;
            transition: var(--tr);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save {
            background: var(--teal);
            color: #000;
            font-weight: 700;
        }

        .btn-save:hover {
            background: #0ee0b6;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: rgba(240, 62, 62, 0.1);
            color: var(--red);
            border-color: rgba(240, 62, 62, 0.2);
        }

        .btn-delete:hover {
            background: var(--red);
            color: #fff;
        }

        .btn-update {
            background: rgba(56, 189, 248, 0.1);
            color: var(--sky);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .btn-update:hover {
            background: var(--sky);
            color: #fff;
        }

        /* Novedades Row */
        .nested-row {
            background: rgba(0, 0, 0, 0.2);
        }

        .nested-box {
            padding: 15px 40px;
            border-left: 2px solid var(--border2);
        }

        .nov-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .nov-title {
            font-family: var(--ff-m);
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nov-badge {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 10px;
            background: var(--s2);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-bottom: 6px;
            align-items: center;
        }

        .nov-badge.critica {
            border-left: 4px solid var(--red);
        }

        .nov-badge.leve {
            border-left: 4px solid var(--amber);
        }

        .nov-desc {
            font-size: 12px;
            color: var(--text);
        }

        .nov-sev {
            font-family: var(--ff-m);
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .sev-critica {
            background: rgba(240, 62, 62, 0.1);
            color: var(--red);
        }

        .sev-leve {
            background: rgba(245, 159, 0, 0.1);
            color: var(--amber);
        }

        /* Status Indicator in Number Row */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .dot-ok {
            background: var(--teal);
            box-shadow: 0 0 8px var(--teal);
        }

        .dot-fuser {
            background: var(--red);
            box-shadow: 0 0 8px var(--red);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        /* Loader */
        .loader-wrap {
            text-align: center;
            padding: 100px;
            color: var(--text-dim);
            font-family: var(--ff-m);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="title-block">
                <h1>PANEL TÉCNICO · FLOTA SEI</h1>
                <p style="color: var(--text-dim); font-size: 11px; margin-top: 4px; font-family: var(--ff-m);">
                    Sincronización de Capacidades Extintoras e Inventario</p>
            </div>
            <a href="dashboard_principal.html" class="btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Dashboard
            </a>
        </header>

        <div class="table-panel">
            <table>
                <thead>
                    <tr>
                        <th style="width: 100px;">Nº Interno</th>
                        <th>Marca / Modelo</th>
                        <th style="width: 90px;">Agua (Gal)</th>
                        <th style="width: 90px;">Espuma (Gal)</th>
                        <th style="width: 90px;">PQS (Lb)</th>
                        <th style="width: 110px;">Q Torreta (Lpm)</th>
                        <th style="width: 120px;">Aeropuerto ID</th>
                        <th style="width: 100px;">Control</th>
                    </tr>
                </thead>
                <tbody id="fleet-body">
                    <!-- Registro Fila -->
                    <tr class="reg-row">
                        <td><input type="text" id="reg-numero" placeholder="P-01"></td>
                        <td>
                            <div style="display: flex; gap: 4px;">
                                <input type="text" id="reg-marca" placeholder="Oshkosh" style="width: 40%;">
                                <input type="text" id="reg-modelo" placeholder="Striker 3000" style="width: 60%;">
                            </div>
                        </td>
                        <td><input type="number" id="reg-agua" placeholder="3000"></td>
                        <td><input type="number" id="reg-espuma" placeholder="420"></td>
                        <td><input type="number" id="reg-pqs" placeholder="500"></td>
                        <td><input type="number" id="reg-torreta" placeholder="1200"></td>
                        <td><input type="text" id="reg-aero" placeholder="SKBO"></td>
                        <td>
                            <button class="btn-action btn-save" onclick="saveMachine()">
                                <span>GUARDAR</span>
                            </button>
                        </td>
                    </tr>
                    <!-- Data rows will be injected here -->
                </tbody>
            </table>
            <div id="loader" class="loader-wrap">CONECTANDO A SUPABASE...</div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let fleetData = [];
        let noveltiesData = [];

        async function init() {
            await loadData();
        }

        async function loadData() {
            document.getElementById('loader').style.display = 'block';
            try {
                const { data: machines, error: mErr } = await supabaseClient
                    .from('maquinas_sei')
                    .select('*')
                    .order('numero_interno', { ascending: true });

                if (mErr) throw mErr;

                const { data: novs, error: nErr } = await supabaseClient
                    .from('novedades_maquinas')
                    .select('*')
                    .eq('reparado', false);

                if (nErr) throw nErr;

                fleetData = machines;
                noveltiesData = novs;
                renderTable();
            } catch (err) {
                console.error(err);
                document.getElementById('loader').textContent = "ERROR DE CONEXIÓN";
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('fleet-body');
            // Keep the first registration row
            const regRow = tbody.querySelector('.reg-row');
            tbody.innerHTML = '';
            tbody.appendChild(regRow);

            fleetData.forEach(m => {
                const mNovs = noveltiesData.filter(n => n.maquina_id === m.id);
                const hasCritical = mNovs.some(n => n.severidad === 'critica');
                const isFuser = (m.estado === 'Fuera de Servicio' || m.estado === 'FUSER') || hasCritical;

                // Main row
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-family: var(--ff-m); font-weight: 700; color: #fff;">
                        <span class="status-dot ${isFuser ? 'dot-fuser' : 'dot-ok'}"></span>
                        ${m.numero_interno}
                    </td>
                    <td>
                        <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">${m.marca}</div>
                        <div style="font-weight: 600;">${m.modelo}</div>
                    </td>
                    <td><input type="number" class="edit-input" value="${m.capacidad_agua_gal || 0}" onchange="updateMachineField('${m.id}', 'capacidad_agua_gal', this.value)"></td>
                    <td><input type="number" class="edit-input" value="${m.capacidad_espuma_gal || 0}" onchange="updateMachineField('${m.id}', 'capacidad_espuma_gal', this.value)"></td>
                    <td><input type="number" class="edit-input" value="${m.libras_pqs || 0}" onchange="updateMachineField('${m.id}', 'libras_pqs', this.value)"></td>
                    <td><input type="number" class="edit-input" value="${m.caudal_torreta_lmin || 0}" onchange="updateMachineField('${m.id}', 'caudal_torreta_lmin', this.value)"></td>
                    <td><input type="text" class="edit-input" value="${m.aeropuerto_id || ''}" onchange="updateMachineField('${m.id}', 'aeropuerto_id', this.value)"></td>
                    <td>
                        <div style="display: flex; gap: 4px;">
                            <button class="btn-action btn-delete" onclick="deleteMachine('${m.id}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);

                // Nested Novelties Row
                const novRow = document.createElement('tr');
                novRow.className = 'nested-row';
                novRow.innerHTML = `
                    <td colspan="8">
                        <div class="nested-box">
                            <div class="nov-header">
                                <div class="nov-title">⚡ NOVEDADES Y ESTADO TÉCNICO</div>
                                <button class="btn-action btn-save" style="padding: 4px 10px; font-size: 9px;" onclick="promptNovelty('${m.id}')">+ AGREGAR NOVEDAD</button>
                            </div>
                            <div class="nov-list">
                                ${mNovs.length > 0 ? mNovs.map(n => `
                                    <div class="nov-badge ${n.severidad}">
                                        <span class="nov-sev sev-${n.severidad}">${n.severidad}</span>
                                        <span class="nov-desc">${n.descripcion}</span>
                                        <button class="btn-action btn-update" style="padding: 4px 8px;" onclick="resolveNovelty('${n.id}')">REPARADO</button>
                                        <button class="btn-del-nov" onclick="deleteNovelty('${n.id}')">✕</button>
                                    </div>
                                `).join('') : '<div style="color: var(--text-muted); font-size: 11px;">Operativo sin novedades registradas.</div>'}
                            </div>
                        </div>
                    </td>
                `;
                tbody.appendChild(novRow);
            });
        }

        /* ── SUPABASE OPERATIONS ── */

        async function saveMachine() {
            const payload = {
                numero_interno: document.getElementById('reg-numero').value,
                marca: document.getElementById('reg-marca').value,
                modelo: document.getElementById('reg-modelo').value,
                capacidad_agua_gal: parseFloat(document.getElementById('reg-agua').value) || 0,
                capacidad_espuma_gal: parseFloat(document.getElementById('reg-espuma').value) || 0,
                libras_pqs: parseFloat(document.getElementById('reg-pqs').value) || 0,
                caudal_torreta_lmin: parseFloat(document.getElementById('reg-torreta').value) || 0,
                aeropuerto_id: document.getElementById('reg-aero').value
            };

            if (!payload.numero_interno) return alert("Ingrese Número Interno");

            const { error } = await supabaseClient.from('maquinas_sei').insert([payload]);
            if (error) alert("Error: " + error.message);
            else {
                // Clear inputs
                document.querySelectorAll('.reg-row input').forEach(i => i.value = '');
                loadData();
            }
        }

        async function updateMachineField(id, field, value) {
            const updateVal = (field === 'aeropuerto_id') ? value : (parseFloat(value) || 0);
            const { error } = await supabaseClient.from('maquinas_sei').update({ [field]: updateVal }).eq('id', id);
            if (error) alert("Error al actualizar: " + error.message);
            // Non-blocking load
        }

        async function deleteMachine(id) {
            if (!confirm("¿Eliminar máquina permanentemente?")) return;
            const { error } = await supabaseClient.from('maquinas_sei').delete().eq('id', id);
            if (error) alert(error.message);
            else loadData();
        }

        async function promptNovelty(mId) {
            const desc = prompt("Descripción de la novedad:");
            if (!desc) return;
            const sev = confirm("¿Es una novedad CRÍTICA (deja la máquina FUSER)?") ? 'critica' : 'leve';

            const { error } = await supabaseClient.from('novedades_maquinas').insert([{
                maquina_id: mId,
                descripcion: desc,
                severidad: sev,
                reparado: false
            }]);

            if (error) alert(error.message);
            else loadData();
        }

        async function resolveNovelty(nId) {
            const { error } = await supabaseClient.from('novedades_maquinas').update({ reparado: true }).eq('id', nId);
            if (error) alert(error.message);
            else loadData();
        }

        async function deleteNovelty(nId) {
            if (!confirm("¿Eliminar registro de novedad?")) return;
            const { error } = await supabaseClient.from('novedades_maquinas').delete().eq('id', nId);
            if (error) alert(error.message);
            else loadData();
        }

        init();
    </script>
</body>

</html>
